openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sync
    description: Sync status operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /push-status:
    get:
      operationId: getPushStatus
      tags: [sync]
      summary: GitHub push status
      description: Returns the result of the last GitHub push attempt
      responses:
        "200":
          description: Push status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushStatus"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PushStatus:
      type: object
      properties:
        status:
          type: string
          enum: [success, failed, unknown]
        pushedAt:
          type: string
          nullable: true
        failedAt:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
      required:
        - status
