openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: sync
    description: Sync status operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /push-config:
    get:
      operationId: getPushConfig
      tags: [sync]
      summary: GitHub push config
      description: Returns the effective retry configuration for the GitHub push script
      responses:
        "200":
          description: Push config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushConfig"
  /push-status:
    get:
      operationId: getPushStatus
      tags: [sync]
      summary: GitHub push status
      description: Returns the result of the last GitHub push attempt
      responses:
        "200":
          description: Push status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushStatus"
components:
  schemas:
    PushConfig:
      type: object
      properties:
        maxRetries:
          type: integer
          description: Maximum number of push retries per token (GH_PUSH_MAX_RETRIES)
        retryDelayMs:
          type: integer
          description: Delay in milliseconds between retries (GH_PUSH_RETRY_DELAY_MS)
      required:
        - maxRetries
        - retryDelayMs
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PushHistoryEntry:
      type: object
      properties:
        status:
          type: string
          enum: [success, failed]
        timestamp:
          type: string
        token:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
          description: Error message for failed attempts
      required:
        - status
        - timestamp
    PushStatus:
      type: object
      properties:
        status:
          type: string
          enum: [success, failed, unknown]
        pushedAt:
          type: string
          nullable: true
        failedAt:
          type: string
          nullable: true
        message:
          type: string
          nullable: true
        history:
          type: array
          items:
            $ref: "#/components/schemas/PushHistoryEntry"
          nullable: true
        tokenExpiryAutoUpdatedTo:
          type: string
          nullable: true
          description: The expiry date (YYYY-MM-DD) that was auto-detected and written for GH_PAT_EXPIRES during this push.
        tokenExpiryAutoUpdatedAt:
          type: string
          nullable: true
          description: ISO-8601 timestamp of when the token expiry auto-update was recorded.
        tokenExpiryAppliedAt:
          type: string
          nullable: true
          description: ISO-8601 timestamp of when GH_PAT_EXPIRES was actually set via setEnvVars (i.e. the env var was applied, not just detected).
      required:
        - status
