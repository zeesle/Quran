kind = "web"
previewPath = "/"
title = "Quran Reader"
version = "1.0.0"
id = "artifacts/quran-reader"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22460

[services.development]
run = "pnpm --filter @workspace/quran-reader run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quran-reader", "run", "build" ]
publicDir = "artifacts/quran-reader/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22460"
BASE_PATH = "/"
